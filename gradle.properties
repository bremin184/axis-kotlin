# Project-wide Gradle settings.

# JVM memory for Gradle daemon — Room KSP + Compose + annotation processing
# needs significantly more than the 512MB default.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Kotlin daemon memory
kotlin.daemon.jvmargs=-Xmx2048m

# Enable parallel execution
org.gradle.parallel=true

# Only configure projects that are needed
org.gradle.configureondemand=true

# Use AndroidX
android.useAndroidX=true

# Non-transitive R classes (recommended)
android.nonTransitiveRClass=true

# Kotlin code style
kotlin.code.style=official
